{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}{{ title }} | BU-MARKET{% endblock %}

{% block content %}
<div class="row justify-content-center py-4">
    <div class="col-md-10 col-lg-8">
        <div class="card border-0 shadow-sm p-4 rounded-3">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-bold mb-0">{{ title }}</h2>
                <a href="{% url 'dashboard:seller_listings' %}" class="btn btn-outline-secondary">
                    <i class="bi bi-chevron-left"></i> Cancel
                </a>
            </div>
            <div class="card mt-3">
</div>
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                
                {{ form|crispy }}
                
                <div class="alert alert-info small mt-3" role="alert">
                    <i class="bi bi-info-circle-fill me-2"></i>
                    All new or edited listings are sent to <strong>moderation review</strong> before going public on the marketplace.
                </div>
                
                <div class="d-grid mt-4">
                    <button type="submit" class="btn btn-primary-bu py-2 fs-5">Save Product Listing</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
